<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EDEAE3">
<title>ひとかじり — 世界を、ひとかじり。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEAE3; --surface:#FAF8F3; --surface2:#FFFFFF;
    --ink:#2B2823; --muted:#776C5E; --line:#DED8CC;
    --sage:#5E7B55; --clay:#A85A41;
    --jp:'Noto Sans JP',system-ui,-apple-system,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--jp);line-height:1.7;
    -webkit-font-smoothing:antialiased;padding-bottom:48px}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px}

  .bar{position:sticky;top:0;z-index:10;background:rgba(237,234,227,.9);
    backdrop-filter:saturate(1.2) blur(8px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:11px 18px}
  .bar .mark{font-weight:700;font-size:15px;letter-spacing:.04em}
  .bar .cnt{font-family:var(--mono);font-size:14px;color:var(--sage);font-weight:600}

  header{padding:34px 0 4px;animation:fade .5s ease both}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  h1{font-size:38px;font-weight:700;letter-spacing:.05em;line-height:1.1}
  .tag{color:var(--muted);font-size:15px;margin-top:9px}
  .date{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:14px}

  .hero{background:var(--surface2);border:1px solid var(--line);border-radius:18px;
    padding:24px;margin:22px 0 8px;text-align:center;animation:fade .5s .05s ease both}
  .hero .lab{font-size:13px;color:var(--muted);margin-bottom:6px}
  .hero .num{font-family:var(--mono);font-size:60px;font-weight:600;line-height:1;
    color:var(--sage);letter-spacing:-.02em;transition:transform .15s}
  .hero .num.tick{transform:scale(1.12)}
  .hero .sub{font-size:12.5px;color:var(--muted);margin-top:13px;
    padding-top:13px;border-top:1px solid var(--line)}

  .sectlab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin:28px 4px 12px}

  .card{background:var(--surface);border:1px solid var(--line);
    border-left:4px solid var(--line);border-radius:0 14px 14px 0;
    padding:15px 16px;margin-bottom:11px;cursor:pointer;
    transition:border-color .18s,opacity .18s,background .18s;
    -webkit-tap-highlight-color:transparent;animation:rise .4s ease both}
  .card:active{transform:scale(.995)}
  .card.done{opacity:.55;border-left-color:var(--sage);background:var(--surface2)}
  .card .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .card .term{font-size:17px;font-weight:700}
  .card .read{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .card .chk{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .card.done .chk{color:var(--sage)}
  .card .line{font-size:14.5px;line-height:1.72;margin-top:5px}

  .more{display:block;width:100%;background:transparent;border:1px solid var(--line);
    border-radius:12px;padding:14px;font-family:var(--mono);font-size:13px;
    color:var(--muted);cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent}
  .more:active{background:var(--surface)}

  footer{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.85}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(min-width:600px){h1{font-size:42px}}
</style>
</head>
<body>
  <div class="bar">
    <span class="mark">ひとかじり</span>
    <span class="cnt" id="barCount">0</span>
  </div>
  <div class="wrap">
    <header>
      <div class="eyebrow">浅く、広く ／ 毎朝更新</div>
      <h1>ひとかじり</h1>
      <div class="tag">世界を、ひとかじり。覚えなくていい。</div>
      <div class="date" id="date"></div>
    </header>

    <div class="hero">
      <div class="lab">これまで かじった 概念</div>
      <div class="num" id="total">0</div>
      <div class="sub">記録するのは、この数だけ。カードをタップ＝「わかった」で増える。</div>
    </div>

    <div class="sectlab" id="sectlab">今日のひとかじり</div>
    <div id="feed"></div>
    <button class="more" id="more" style="display:none">もっと見る</button>

    <footer>
      出典：Wikipedia ランダム記事 ／ 要約：Gemini × v3契約<br>
      毎朝6時(JST)に新しい一皿。累計はこの端末に保存される。
    </footer>
  </div>

<script>
const NAME='hitokajiri';
const SEED=[
 {term:"バオバブ",reading:"",line:"アフリカのサバンナに立つ、幹が異様に太い木。体内に水を何トンも溜め込む天然のタンクで、星の王子さまにも出てくる。"},
 {term:"フーゴ・グロティウス",reading:"ふーごぐろてぃうす",line:"17世紀オランダの法学者。海は誰のものでもなく皆が自由に使える、と唱えて今の国際法の土台を作った人。"},
 {term:"電気うなぎ",reading:"でんきうなぎ",line:"自分の体で発電して獲物を感電させる魚。最大800ボルト、家庭のコンセント(100V)の何倍も出す。"},
 {term:"ターコイズ",reading:"",line:"空色〜青緑のあの宝石。銅が混ざって色がつく石で、古代エジプトではお守りにされていた。"},
 {term:"サンクトペテルブルク",reading:"さんくとぺてるぶるく",line:"ロシア第二の都市。沼地を埋めて人工的に造った北のヴェネツィアで、運河だらけ。"},
 {term:"マンチカン",reading:"",line:"足が短い猫の品種。胴長短足のコーギーの猫版で、突然変異から生まれた。"},
 {term:"ベンゼン環",reading:"べんぜんかん",line:"炭素6個が正六角形に手をつないだ形。プラスチックも薬も香料も、この亀の甲羅みたいな部品からできている。"},
 {term:"ハンザ同盟",reading:"はんざどうめい",line:"中世ヨーロッパの商人たちが作った貿易の組合。国をまたいで港町同士が手を組み、海の交易を仕切った。"}
];
const PAGE=20; let cards=[], shown=0, today='';

function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getTotal(){return parseInt(localStorage.getItem(NAME+'_total')||'0',10);}
function setTotal(n){localStorage.setItem(NAME+'_total',String(Math.max(0,n)));paintTotal(true);}
function doneKey(){return NAME+'_done_'+today;}
function getDone(){try{return new Set(JSON.parse(localStorage.getItem(doneKey())||'[]'));}catch(e){return new Set();}}
function setDone(s){localStorage.setItem(doneKey(),JSON.stringify([...s]));}
function paintTotal(tick){
  const t=getTotal(); const el=document.getElementById('total');
  el.textContent=t; document.getElementById('barCount').textContent=t;
  if(tick){el.classList.add('tick');setTimeout(()=>el.classList.remove('tick'),160);}
}
function esc(s){return String(s).replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}

function render(){
  const feed=document.getElementById('feed'); const done=getDone();
  feed.innerHTML=cards.slice(0,shown).map(function(c,i){
    return '<div class="card '+(done.has(i)?'done':'')+'" data-i="'+i+'">'
      +'<div class="top"><span class="term">'+esc(c.term)+'</span>'
      +(c.reading?'<span class="read">('+esc(c.reading)+')</span>':'')
      +'<span class="chk">'+(done.has(i)?'✓ わかった':'tap')+'</span></div>'
      +'<div class="line">'+esc(c.line)+'</div></div>';
  }).join('');
  Array.prototype.forEach.call(document.querySelectorAll('.card'),function(el){
    el.onclick=function(){toggle(parseInt(el.dataset.i,10));};
  });
  document.getElementById('more').style.display = shown<cards.length?'block':'none';
}
function toggle(i){
  const done=getDone();
  if(done.has(i)){done.delete(i);setTotal(getTotal()-1);}
  else{done.add(i);setTotal(getTotal()+1);}
  setDone(done); render();
}
async function load(){
  const now=new Date(); today=ymd(now);
  document.getElementById('date').textContent=today;
  try{
    const r=await fetch('./cards.json',{cache:'no-store'});
    if(!r.ok) throw 0;
    const data=await r.json();
    cards=data.cards||[];
    if(data.date){today=data.date;document.getElementById('date').textContent=today;}
    if(!cards.length) throw 0;
  }catch(e){
    cards=SEED;
    document.getElementById('sectlab').textContent='今日のひとかじり（サンプル）';
  }
  shown=Math.min(PAGE,cards.length); paintTotal(false); render();
}
document.getElementById('more').onclick=function(){shown=Math.min(shown+PAGE,cards.length);render();};
load();
</script>
</body>
</html>
