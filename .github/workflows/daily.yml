name: daily-cards

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 毎朝 06:00 JST
  workflow_dispatch:
  push:                     # push でも回す（初回反映用）

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: generate cards (v4)
        run: node summarize.mjs
      - name: critique & flag
        run: node critique.mjs
      - name: commit
        run: |
          git config user.name  "hitokajiri-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json reports loops proposals
          git diff --staged --quiet || git commit -m "cards+audit: $(date -u +%Y-%m-%d)"
          git push
