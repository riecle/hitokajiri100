name: daily-cards

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 毎朝 06:00 JST
  workflow_dispatch:        # 手動実行（初回はこれで回す）

permissions:
  contents: write           # cards.json をコミットするため

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: generate cards
        run: node summarize.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: commit
        run: |
          git config user.name  "hitokajiri-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json
          git diff --staged --quiet || git commit -m "cards: $(date -u +%Y-%m-%d)"
          git push
